<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto - Banca Hubitat</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <div class="main-content">
            <header class="app-header">
                <button class="icon-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
                <h2>Crypto</h2>
                <div class="profile-icon">VS</div>
            </header>

            <section class="balance-section">
                <p class="balance-label">Bilancio Crypto</p>
                <h1 class="balance-amount">€ 1.240,15</h1>
                <div style="color: #EF4444; font-size: 14px; font-weight: 600;">-2.1% oggi</div>
            </section>

            <div class="bottom-sheet">
                <div class="transactions-header">
                    <h3>Le tue monete</h3>
                </div>
                
                <div class="transaction-item">
                    <div class="tx-icon" style="background: #fff7ed; color: #f59e0b;"><i class="fab fa-bitcoin"></i></div>
                    <div class="tx-details">
                        <h4>Bitcoin</h4>
                        <p>0.015 BTC</p>
                    </div>
                    <div class="tx-amount">€ 950,20</div>
                </div>

                <div class="transaction-item">
                    <div class="tx-icon" style="background: #eef2ff; color: #6366f1;"><i class="fab fa-ethereum"></i></div>
                    <div class="tx-details">
                        <h4>Ethereum</h4>
                        <p>0.12 ETH</p>
                    </div>
                    <div class="tx-amount">€ 289,95</div>
                </div>

                <div style="margin-top: 30px; text-align: center;">
                    <button class="add-wallet-btn" style="background: #111;">Compra Crypto</button>
                </div>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item" onclick="window.location.href='index.html'">
                    <i class="fab fa-envira"></i>
                    <span>Home</span>
                </div>
                <div class="nav-item" onclick="window.location.href='investi.html'">
                    <i class="fas fa-chart-pie"></i>
                    <span>Investi</span>
                </div>
                <div class="nav-item" onclick="window.location.href='trasferisci.html'">
                    <i class="fas fa-exchange-alt"></i>
                    <span>Trasferisci</span>
                </div>
                <div class="nav-item active">
                    <i class="fas fa-shield-alt"></i>
                    <span>Crypto</span>
                </div>
                <div class="nav-item" onclick="window.location.href='lifestyle.html'">
                    <i class="fas fa-th-large"></i>
                    <span>Lifestyle</span>
                </div>
            </nav>
        </div>
    </div>
</body>
</html>
