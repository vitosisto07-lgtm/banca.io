<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifestyle - Banca Hubitat</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        .lifestyle-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .lifestyle-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e5e7eb;
            transition: transform 0.2s;
        }
        .lifestyle-card:active {
            transform: scale(0.95);
        }
        .lifestyle-card i {
            font-size: 24px;
            color: var(--primary-blue);
            margin-bottom: 10px;
        }
        .lifestyle-card h4 {
            font-size: 14px;
            color: var(--text-dark);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-content">
            <header class="app-header">
                <button class="icon-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
                <h2>Lifestyle</h2>
                <div class="profile-icon">VS</div>
            </header>

            <div class="bottom-sheet" style="padding-top: 20px;">
                <div class="transactions-header">
                    <h3>Servizi Esclusivi</h3>
                </div>
                
                <div class="lifestyle-grid">
                    <div class="lifestyle-card">
                        <i class="fas fa-plane"></i>
                        <h4>Viaggi</h4>
                    </div>
                    <div class="lifestyle-card">
                        <i class="fas fa-ticket-alt"></i>
                        <h4>Eventi</h4>
                    </div>
                    <div class="lifestyle-card">
                        <i class="fas fa-utensils"></i>
                        <h4>Ristoranti</h4>
                    </div>
                    <div class="lifestyle-card">
                        <i class="fas fa-shopping-bag"></i>
                        <h4>Shopping</h4>
                    </div>
                    <div class="lifestyle-card">
                        <i class="fas fa-heartbeat"></i>
                        <h4>Salute</h4>
                    </div>
                    <div class="lifestyle-card">
                        <i class="fas fa-concierge-bell"></i>
                        <h4>Concierge</h4>
                    </div>
                </div>
                <div style="margin-top: 20px;">
                    <button class="add-wallet-btn" id="installBtnLifestyle" style="background: var(--primary-blue);"><i class="fas fa-download"></i> Scarica App Banca Hubitat</button>
                </div>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item" onclick="window.location.href='index.html'">
                    <i class="fab fa-envira"></i>
                    <span>Home</span>
                </div>
                <div class="nav-item" onclick="window.location.href='investi.html'">
                    <i class="fas fa-chart-pie"></i>
                    <span>Investi</span>
                </div>
                <div class="nav-item" onclick="window.location.href='trasferisci.html'">
                    <i class="fas fa-exchange-alt"></i>
                    <span>Trasferisci</span>
                </div>
                <div class="nav-item" onclick="window.location.href='crypto.html'">
                    <i class="fas fa-shield-alt"></i>
                    <span>Crypto</span>
                </div>
                <div class="nav-item active">
                    <i class="fas fa-th-large"></i>
                    <span>Lifestyle</span>
                </div>
            </nav>
        </div>
    </div>
</body>
</html>
