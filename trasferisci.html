<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trasferisci - Banca Hubitat</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <div class="main-content">
            <header class="app-header">
                <button class="icon-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
                <h2>Invia denaro</h2>
                <div class="profile-icon">VS</div>
            </header>

            <section class="quick-actions" style="padding-top: 40px;">
                <div class="action-btn-group">
                    <button class="circle-btn" style="background: var(--primary-blue);"><i class="fas fa-user-plus"></i></button>
                    <span>Nuovo</span>
                </div>
                <div class="action-btn-group">
                    <button class="circle-btn"><i class="fas fa-qrcode"></i></button>
                    <span>QR Code</span>
                </div>
                <div class="action-btn-group">
                    <button class="circle-btn"><i class="fas fa-link"></i></button>
                    <span>Link</span>
                </div>
            </section>

            <div class="bottom-sheet">
                <div class="transactions-header">
                    <h3>Contatti recenti</h3>
                    <a href="#">Vedi tutto</a>
                </div>
                
                <div class="transaction-item">
                    <div class="profile-icon" style="margin-right: 15px; background: #e0f2fe; color: #0EA5E9;">MA</div>
                    <div class="tx-details">
                        <h4>Maria Rossi</h4>
                        <p>IBAN: IT12 ... 4567</p>
                    </div>
                    <i class="fas fa-chevron-right" style="color: var(--text-gray);"></i>
                </div>

                <div class="transaction-item">
                    <div class="profile-icon" style="margin-right: 15px; background: #e0f2fe; color: #0EA5E9;">LB</div>
                    <div class="tx-details">
                        <h4>Luca Bianchi</h4>
                        <p>Mobile: +39 333 ...</p>
                    </div>
                    <i class="fas fa-chevron-right" style="color: var(--text-gray);"></i>
                </div>
                
                <div style="margin-top: 30px;">
                    <button class="add-wallet-btn" style="background: var(--primary-blue);">Nuovo Bonifico</button>
                </div>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item" onclick="window.location.href='index.html'">
                    <i class="fab fa-envira"></i>
                    <span>Home</span>
                </div>
                <div class="nav-item" onclick="window.location.href='investi.html'">
                    <i class="fas fa-chart-pie"></i>
                    <span>Investi</span>
                </div>
                <div class="nav-item active">
                    <i class="fas fa-exchange-alt"></i>
                    <span>Trasferisci</span>
                </div>
                <div class="nav-item" onclick="window.location.href='crypto.html'">
                    <i class="fas fa-shield-alt"></i>
                    <span>Crypto</span>
                </div>
                <div class="nav-item" onclick="window.location.href='lifestyle.html'">
                    <i class="fas fa-th-large"></i>
                    <span>Lifestyle</span>
                </div>
            </nav>
        </div>
    </div>
</body>
</html>
